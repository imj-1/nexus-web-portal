<div class="login-page">
  <div class="login-glow"></div>
  <div class="login-grid"></div>

  <div class="login-card">

    <a class="card-brand" routerLink="/">NEXUS</a>
    <h1 class="card-title">Welcome Back</h1>
    <p class="card-sub">Sign in to access your Nexus account.</p>

    @if (serverError) {
      <p class="server-error">{{ serverError }}</p>
    }

    <button class="btn-submit" (click)="onSubmit()" [disabled]="loading">
      @if (loading) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        Sign In
      }
    </button>

    <p class="register-prompt">
      Not a member yet?
      <a routerLink="/auth/register" class="register-link">Open an Account</a>
    </p>

  </div>
</div>
